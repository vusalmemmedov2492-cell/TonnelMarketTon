<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tonnel - Full App</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%; height: 100%; background: #000; 
            font-family: 'Inter', sans-serif; color: white;
            overflow-x: hidden;
        }

        /* Шапка */
        .top-nav {
            width: 100%; background: #12181f; padding: 10px 15px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 8px; }
        .balance { background: #1c232d; padding: 5px 12px; border-radius: 10px; display: flex; align-items: center; gap: 6px; font-size: 14px; }
        .ton-symbol { width: 18px; height: 18px; }
        .btn-action { width: 32px; height: 32px; background: #0098ea; border: none; border-radius: 8px; color: white; font-size: 18px; font-weight: bold; }

        /* Категории */
        .filter-row { display: flex; align-items: center; gap: 10px; padding: 15px; background: #000; }
        .filter-card { flex: 1; background: #12181f; padding: 12px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); }
        .filter-label { font-size: 10px; color: #515966; text-transform: uppercase; margin-bottom: 2px; display: block; }
        .filter-value { font-size: 15px; font-weight: 600; color: #fff; }
        .da-icon-box { background: #12181f; width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.05); }

        /* Лента NFT */
        .nft-stream { width: 100%; display: flex; flex-direction: column; padding-bottom: 80px; }
        .nft-full-img { width: 100%; display: block; border: none; }

        /* МЕНЮ (Белый текст) */
        .bottom-text-menu {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #0d1218; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around;
            padding: 15px 0 35px 0; z-index: 1000;
        }
        .menu-link { text-decoration: none; color: #ffffff; font-size: 13px; font-weight: 600; opacity: 0.8; }
        .menu-link.active { color: #0098ea; opacity: 1; }

        /* ПОЛНОЭКРАННОЕ ОКНО MY GIFT */
        #full-modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 3000;
            flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-img-full { width: 100%; height: auto; display: block; }
        
        .modal-body { 
            padding: 40px 20px; text-align: center; flex-grow: 1; 
            display: flex; flex-direction: column; justify-content: center; 
        }
        .modal-title { font-size: 22px; font-weight: 700; margin-bottom: 15px; }
        .modal-desc { font-size: 16px; color: #ccc; margin-bottom: 5px; }
        .modal-username { color: #0098ea; font-size: 20px; font-weight: 800; margin-bottom: 30px; }

        .btn-close-full {
            background: #ffffff; color: #000; border: none;
            padding: 15px; border-radius: 15px; font-size: 16px; font-weight: 700;
            width: 100%; max-width: 300px; align-self: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="full-modal">
        <img src="https://i.postimg.cc/5Np0hGpL/Do.jpg" class="modal-img-full">
        <div class="modal-body">
            <h2 class="modal-title">Want to sell your Gift?</h2>
            <p class="modal-desc">Transfer it to</p>
            <p class="modal-username">@GiftRelayerTonnel</p>
            <button class="btn-close-full" onclick="closeModal()">Back to Market</button>
        </div>
    </div>

    <div id="main-content">
        <div class="top-nav">
            <div class="nav-left">
                <div class="balance">
                    <img src="https://i.postimg.cc/9MRh4wtK/lv-0-20260310221226.png" class="ton-symbol"> 
                    <span>0</span>
                </div>
                <button class="btn-action">+</button>
                <button class="btn-action">−</button>
            </div>
            <div id="ton-connect-header"></div>
        </div>

        <div class="filter-row">
            <div class="filter-card"><span class="filter-label">Gifts</span><span class="filter-value">All</span></div>
            <div class="filter-card"><span class="filter-label">Model</span><span class="filter-value">All</span></div>
            <div class="da-icon-box"><img src="https://i.postimg.cc/2yM2X3sk/Da.png" style="width:22px;"></div>
        </div>

        <div class="nft-stream">
            <img src="https://i.postimg.cc/JhhfHH5C/Screenshot_20260310_221830_Telega.jpg" class="nft-full-img">
            <img src="https://i.postimg.cc/FKKMkkV4/Screenshot_20260310_221835_Telega.jpg" class="nft-full-img">
            <img src="https://i.postimg.cc/6q7R8cyH/Screenshot_20260310_221850_Telega.jpg" class="nft-full-img">
            <img src="https://i.postimg.cc/0j6mznbV/Screenshot_20260310_221854_Telega.jpg" class="nft-full-img">
        </div>

        <div class="bottom-text-menu">
            <a href="javascript:void(0)" class="menu-link" onclick="openModal()">My Gift</a>
            <a href="#" class="menu-link">Auction</a>
            <a href="#" class="menu-link">Lease</a>
            <a href="#" class="menu-link active">Market</a>
        </div>
    </div>

    <script>
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/main/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-header'
        });

        function openModal() {
            document.getElementById('full-modal').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Запрещаем скролл ленты под окном
        }

        function closeModal() {
            document.getElementById('full-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
